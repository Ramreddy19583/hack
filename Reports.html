    <h1>Use your camera</h1>
    <p>Save your reports</p>

    <video id="video" autoplay playsinline width="400" height="300" style="background: #000;"></video>
    <canvas id="canvas" width="400" height="300" style="display:none;"></canvas>
    
    <div class="controls">
        <button id="start">Start Camera</button>
        <button id="snap" disabled>Take Snapshot</button>
        <button id="save" disabled>Save Snapshot</button>
        <button id="stop" disabled>Stop Camera</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('start');
    const snapBtn = document.getElementById('snap');
    const saveBtn = document.getElementById('save');
    const stopBtn = document.getElementById('stop');
    const context = canvas.getContext('2d');
    let stream = null;

    // 1. Start Camera
    startBtn.addEventListener('click', async () => {
        try {
            // Constraints: Requesting video
            const constraints = {
                video: { facingMode: "user" }, // "user" for front cam, "environment" for back
                audio: false
            };

            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            
            // UI Updates
            snapBtn.disabled = false;
            stopBtn.disabled = false;
            startBtn.disabled = true;
        } catch (err) {
            console.error("Error accessing camera: ", err);
            alert("Could not access camera. Ensure you are using HTTPS or Localhost and have granted permissions.");
        }
    });

    // 2. Take Snapshot
    snapBtn.addEventListener('click', () => {
        // Match canvas size to actual video stream size
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Draw the current frame
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Show the canvas (optional, if you want to preview the still)
        canvas.style.display = "block";
        saveBtn.disabled = false;
    });

    // 3. Save Snapshot
    saveBtn.addEventListener('click', () => {
        const dataURL = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = dataURL;
        link.download = `report_${new Date().getTime()}.png`;
        link.click();
    });

    // 4. Stop Camera
    stopBtn.addEventListener('click', () => {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            
            // Reset UI
            snapBtn.disabled = true;
            saveBtn.disabled = true;
            stopBtn.disabled = true;
            startBtn.disabled = false;
            canvas.style.display = "none";
        }
    });
</script>
